version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: quizmaster
      POSTGRES_USER: quizmaster
      POSTGRES_PASSWORD: ${DB_PASSWORD:-quizmaster_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quizmaster"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://quizmaster:${DB_PASSWORD:-quizmaster_secret}@db:5432/quizmaster
      ALLOWED_ORIGINS: "http://localhost,http://frontend"
      ENVIRONMENT: production
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
