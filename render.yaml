# ─────────────────────────────────────────────────────────────
#  Render IaC — QuizMaster
#  Deploy: push to GitHub → connect repo in Render dashboard →
#  it reads this file and provisions everything automatically.
#
#  After first deploy:
#   1. Copy the backend service URL (e.g. https://quizmaster-api.onrender.com)
#   2. Set ALLOWED_ORIGINS on the backend service to that frontend URL
#   3. Set VITE_API_URL on the frontend to the backend URL
#   4. Set VITE_WS_URL on the frontend to wss://quizmaster-api.onrender.com
#   5. Set GROQ_API_KEY (and optionally OPENROUTER_API_KEY) on the backend
# ─────────────────────────────────────────────────────────────

services:

  # ── Backend: FastAPI Web Service (Docker) ───────────────────
  - type: web
    name: quizmaster-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health

    envVars:
      # Render injects the managed-DB connection string automatically
      - key: DATABASE_URL
        fromDatabase:
          name: quizmaster-db
          property: connectionString

      # Auto-generate a strong random JWT secret — never hardcoded
      - key: JWT_SECRET
        generateValue: true

      - key: ENVIRONMENT
        value: production

      # Set to your Render frontend URL after first deploy, e.g.:
      # https://quizmaster-frontend.onrender.com
      - key: ALLOWED_ORIGINS
        sync: false

      # Add your Groq key in the Render dashboard (not committed to git)
      - key: GROQ_API_KEY
        sync: false

      - key: OPENROUTER_API_KEY
        sync: false

      # Email — leave blank to disable
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false

  # ── Frontend: React Static Site ─────────────────────────────
  - type: web
    name: quizmaster-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist

    # SPA routing — all paths fall through to index.html
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      # Set to the backend service URL after first deploy, e.g.:
      # https://quizmaster-api.onrender.com
      - key: VITE_API_URL
        sync: false

      # WebSocket endpoint — use wss:// scheme, e.g.:
      # wss://quizmaster-api.onrender.com
      - key: VITE_WS_URL
        sync: false

# ── Managed PostgreSQL ─────────────────────────────────────────
databases:
  - name: quizmaster-db
    databaseName: quizmaster
    plan: free
